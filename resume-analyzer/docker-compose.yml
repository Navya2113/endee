# ============================================================
#  AI Resume Analyzer — Docker Compose
#  Services: endee | backend | frontend
# ============================================================
version: "3.9"

services:

  # ── Endee Vector Database ─────────────────────────────────
  endee:
    image: endeeio/endee-server:latest
    container_name: endee-server
    ports:
      - "8080:8080"
    ulimits:
      nofile: 100000
    environment:
      NDD_NUM_THREADS: 0       # auto-detect
      NDD_AUTH_TOKEN: ""       # leave blank = no auth
    volumes:
      - endee-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/v1/index/list"]
      interval: 10s
      timeout: 5s
      retries: 8

  # ── FastAPI Backend ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resume-backend
    ports:
      - "8000:8000"
    environment:
      - ENDEE_URL=http://endee:8080/api/v1
    depends_on:
      endee:
        condition: service_healthy
    volumes:
      - hf-cache:/root/.cache/huggingface
    restart: unless-stopped

  # ── React Frontend (Nginx) ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: resume-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  endee-data:
  hf-cache:
